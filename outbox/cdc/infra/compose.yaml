services:
  postgres:
    image: 'postgres:latest'
    command: ['postgres', '-c', 'wal_level=logical']
    environment:
      - 'POSTGRES_DB=order-service'
      - 'POSTGRES_PASSWORD=secret'
      - 'POSTGRES_USER=order-user'
    ports:
      - '5432:5432'
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
  kafka:
    image: 'apache/kafka:latest'
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_INTERNAL://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    ports:
      - '9092:9092'
  kafka-connect:
    image: 'debezium/connect:2.5'
    depends_on:
      - kafka
      - postgres
    ports:
      - '8083:8083'
    environment:
      BOOTSTRAP_SERVERS: kafka:29092
      GROUP_ID: connect-cluster
      CONFIG_STORAGE_TOPIC: connect-configs
      OFFSET_STORAGE_TOPIC: connect-offsets
      STATUS_STORAGE_TOPIC: connect-status
      CONFIG_STORAGE_REPLICATION_FACTOR: 1
      OFFSET_STORAGE_REPLICATION_FACTOR: 1
      STATUS_STORAGE_REPLICATION_FACTOR: 1
      KEY_CONVERTER: org.apache.kafka.connect.storage.StringConverter
      VALUE_CONVERTER: org.apache.kafka.connect.storage.StringConverter
    volumes:
      - ./debezium-connector.json:/connector-config.json
  register-connector:
    image: curlimages/curl:latest
    depends_on:
      - kafka-connect
    entrypoint: ["sh", "-c", "echo 'Waiting for Kafka Connect...'; until curl -s http://kafka-connect:8083/connectors; do sleep 2; done; echo 'Registering connector...'; curl -X POST http://kafka-connect:8083/connectors -H 'Content-Type: application/json' -d @/connector-config.json; echo 'Connector registered.'"]
    volumes:
      - ./debezium-connector.json:/connector-config.json
