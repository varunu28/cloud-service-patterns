services:
  postgres:
    image: 'postgres:latest'
    container_name: 'orderdb'
    environment:
      - 'POSTGRES_DB=orderdb'
      - 'POSTGRES_PASSWORD=secret'
      - 'POSTGRES_USER=myuser'
    ports:
      - '5432:5432'
    volumes:
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
